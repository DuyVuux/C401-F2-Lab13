# Alert Rules Configuration
# Defines monitoring alerts for the Day 13 Observability Lab
# Each alert includes trigger conditions, severity, and runbook references

alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: service_down
    severity: P0
    condition: uptime_pct < 99.9 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#5-service-down
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
  - name: low_quality_score
    severity: P3
    condition: quality_score_avg < 0.5 for 1h
    type: symptom-based
    owner: product-owner
    runbook: docs/alerts.md#4-low-quality-score
