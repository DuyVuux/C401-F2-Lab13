# Service Level Objectives (SLOs)
# Defines performance and reliability targets for the Day 13 Observability Lab
# Window: 28 days (rolling)

service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
  error_rate_pct:
    objective: 2
    target: 99.0
  uptime_pct:
    objective: 99.9
    target: 99.95
  daily_cost_usd:
    objective: 2.5
    target: 100.0
  quality_score_avg:
    objective: 0.75
    target: 95.0
